name: Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  # Run on all pull requests for pre-merge validation and coverage reporting
  pull_request:
  # Run on pushes to main to update the baseline coverage after merge
  # This populates the Codecov dashboard and updates the coverage badge
  push:
    branches:
      - main

jobs:
  run-tests:
    name: Run Tests
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: github-linux-arm64-8core
            container:
              image: ghcr.io/viam-modules/viam-camera-realsense:arm64
              options: --platform linux/arm64
            coverage: false
          - os: ubuntu-latest
            container:
              image: ghcr.io/viam-modules/viam-camera-realsense:amd64
              options: --platform linux/amd64
            coverage: true
          - os: macos-latest
            coverage: false

    container: ${{ matrix.container }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          make setup
          test -f ./venv/bin/activate && . ./venv/bin/activate && conan profile show

      - name: Install Conan dependencies
        run: |
          make conan-install-test

      - name: Lint
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          make lint
          if ! git diff --quiet; then
            echo -e "\033[31mError: lint make target produced changes. Please run 'make lint' locally and commit the results.\033[0m"
            git diff
            exit 1
          fi

      - name: Install lcov (Linux amd64 only)
        if: matrix.coverage == true
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Build and run tests with coverage (Linux amd64 only)
        if: matrix.coverage == true
        run: make test-coverage

      - name: Build and run tests (other platforms)
        if: matrix.coverage != true
        run: make test

      - name: Upload coverage reports to Codecov
        if: matrix.coverage == true
        uses: codecov/codecov-action@v5
        with:
          files: ./build-conan/coverage.info
          flags: unittests
          # Token is optional for public repos, but recommended for reliability
          # If uploads fail, ensure CODECOV_TOKEN is set in repository secrets
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          fail_ci_if_error: true
          verbose: true
